# Kubernetes Secrets store sensitive values like passwords. Values must be
# base64-encoded -- NOT encrypted, just encoded, so this is NOT a substitute
# for a real secrets manager in production (see README for more on this).
# For this learning project, stringData lets us write plain text and have
# Kubernetes base64-encode it automatically, which is simpler to read than
# pre-encoding every value by hand.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: taskdb
